pages_content:
  index:
    about_services:
      why_train_with_mike:
        title: "Why Train With Mike?"
        blurb: "With over 30 years of professional instructional experience, Mike doesn’t just teach you how to scramble through a practical test—he focuses on building 110% of the advanced road confidence and safety skills you actually need for the real world."
        perks_list:
          - title: "Proven Training Fleet"
            text: "Reliable, well-maintained 125cc, 500cc, and 600cc machines that are perfect for learning the ropes."
          - title: "Real-time Coaching"
            text: "Crystal-clear instructor-to-rider radio systems for instant feedback on the move."
          - title: "Full Kit Provided"
            text: "High-visibility safety jackets and essential equipment provided for every single module."
      services_overview:
        title: "Our Training Programs"
        blurb: "From complete beginners getting onto two wheels for the first time to experienced riders stepping up to high-capacity machinery, we've got you covered."
        services:
          - "CBT Training"
          - "A1 & A2 Lightweight"
          - "Direct Access (Category A)"
          - "Back to Biking Refresher"
    cta:
      title: "New to motorcycles? Come try it and see if you like it!"
      blurb: "Get a real feel for riding with our introductory session. No pressure, no commitment—just expert guidance on a proper machine."
      big_bike: "Try A Big Bike For £50"
    main_testimonial:
      title: "Featured Endorsement"
      callout: "\"In my role as an emergency services worker... I found Mike's instruction to be at an advanced level.\""
      callout_attribution: "Officer Carter"
      letter_paragraphs:
        - "From day one, I was extremely impressed with your professionalism, knowledge and kindness. You have a unique way of making people feel at ease and at home, which is not only down to your personality, but clearly from your many years of experience as a professional motorcycle instructor."
        - "Although I have to work varied shifts, you always managed to arrange convenient times and dates for the training rides. This is undoubtedly down to your forward planning, organisation and personal sacrifice. I was particularly pleased, and surprised, that the whole of my course was done on your well maintained Yamaha 600cc Fazers."
        - "The training rides with you were extremely enjoyable, each one I looked forward to immensely. You make the instruction easy to understand, and your radio equipment is crystal clear."
        - "In my role as an emergency services worker, I am required to drive to a very high standard. I found your instruction and training to be that of an advanced level, with safety being your number one objective."
        - "Both myself and my friend Mark Grant, who also did the course at the same time, were over the moon when we both passed our tests first time - me passing with no faults and Mark with just one minor fault. Not a bad result for two people who hadn't done a driving test for over 20 years! This was purely down to your training and preparation. I can honestly say I would not have passed my test without your tuition."
        - "I would also like to thank you for the excellent Enhanced Rider Scheme that I did with you soon after passing my test. This gave me even more confidence and knowledge as a newly qualified rider, and made a real difference when I came to insure my new Honda 600 Hornet."
        - "We both passed our Mod 1 tests with zero faults."
        - "Mike, once again thank you so much for your excellent tuition &mdash; it has been an absolute pleasure meeting you and learning to ride with you. I look forward to recommending you to as many people as possible. I hope to stay in touch and call in for a coffee and a chat on a regular basis."
      letter_attribution:
          name: "Mark Carter"
          role: "Police Officer • Direct Access Graduate"
    reviews_section:
      heading: "What Our Riders Say"
      reviews:
        - author: "Craig"
          rating: 5
          text: "Passed both Mod 1 & Mod 2 first try, Mod 2 with a clean sheet. The examiner even said Mike teaches you 110% of what you need. Very flexible and will bend over backwards to get you where you need to be."
          
        - author: "Jonny B."
          rating: 5
          text: "His knowledge is top-level and his advice has made me a confident rider in a short space of time. Passed my Mod 2 with zero minor faults — the perfect way to finish!"
          
        - author: "David B."
          rating: 5
          text: "First class instructor and the best in the business. Calm, patient and very attentive. His years of experience make a big difference and his calm approach rubs off on his students."

  courses:
    page_title: "Price List For Courses"
    blurb: "Prices from 1st July 2026. Test fees subject to change by DVSA."
    course_list:
      - title: "A Full Unrestricted Licence"
        age_req: "Age 24 (or 21 if candidate has held a full A2 licence for 2 yrs)"
        bike_spec: "Minimum 595cc Motorcycle with at least 40 kw (54 bhp)"
        includes: "An Introductory Session (lasts 60-90 minutes), CBT, Module 1 training, one Module 1 test fee, and 7 sessions of Module 2 training (each session 2½ - 3 hours), and one Module 2 test fee."
        price: "£1200"
        extras: "Additional sessions (2.5–3 hrs): £150"
      - title: "A2 Full Restricted Licence"
        age_req: "Age 19-23"
        bike_spec: "Minimum 395cc motorcycle at least 25kw/34 bhp. Not exceeding 35 kw (47 bhp)"
        includes: "An Introductory Session (lasts 60 to 90 minutes), CBT, Module 1 training, and one Module 1 test and 7 sessions (each session 2½-3 hours), and one Module 2 test fee."
        price: "£1200"
        extras: "Additional sessions (2.5–3 hrs): £150"
      - title: "Back to Biking Development Training"
        age_req: "Full licence holders"
        bike_spec: ""
        includes: "2½-3 hours on a 1 to 1 basis."
        price: "£150"
        extras: ""
    terms_conditions:
      title: "Terms & Conditions"
      notes:
        - "Test fees subject to change by DVSA."
        - "Full Terms & Conditions are available to view at training premises."
        - "Trainees using their own motorcycles must ensure that their bikes meet all legal requirements."
        - "Trainees are responsible for themselves to meet the legal requirements to ride the bike."
      summary: "All fees once paid are non-refundable but the lesson may be re-arranged up to 24 hours prior to the pre-paid course. All in-training packages must be completed within 6 months from the start date. Insurance cover for the motorbike training will be covered to third party and training bike, NOT to personal injury. Although professional instruction will be given to the trainee throughout, any decisions during the instruction made by the trainee are their responsibility. All monies paid or courses booked are non-transferable. Traffic violations are the responsibility of the trainee and not the Instructor."
    mod1_video:
      title: "Watch a Mod 1 Run-Through"
      blurb: "Check out exactly what to expect on the DVSA training pad. Watch the lines, the speeds, and the layout before your big day."
      filename: "assets/final_720_h265_fadeout.mp4"
      poster: "assets/mod1-video-thumb.jpg"

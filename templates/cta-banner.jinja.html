{% set cta = page_content.cta %}

<section class="cta-banner">
  <div class="cta-text-content">
    <h3>{{ cta.title }}</h3>
    <p>{{ cta.blurb }}</p>
  </div>

  <div class="cta-button-wrap">
    <a href="prices.htm" class="embossed-btn">
      <span class="btn-primary">{{ cta.big_bike }}</span>
      <span class="btn-sub">Click Here to Book</span>
    </a>
  </div>
</section>
